    <style>
        body {
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            /* Experiencia inmersiva */
            background-color: #030303;
        }

        /* Glass Panel Styling */
        .glass-panel {
            background: rgba(10, 10, 10, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-container {
            background: rgba(3, 3, 3, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Glow Effects */
        .glow-text {
            text-shadow: 0 0 15px rgba(217, 0, 255, 0.6);
        }

        .glow-box {
            box-shadow: 0 0 20px rgba(217, 0, 255, 0.3);
        }

        /* Status Dot Animations */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .status-online {
            background-color: #00ff00;
            box-shadow: 0 0 12px #00ff00;
            animation: pulse-green 2s infinite;
        }

        .status-connecting {
            background-color: #ffa500;
            box-shadow: 0 0 12px #ffa500;
            animation: pulse-orange 1.5s infinite;
        }

        .status-error {
            background-color: #ff0000;
            box-shadow: 0 0 12px #ff0000;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(0, 255, 0, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0);
            }
        }

        @keyframes pulse-orange {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(255, 165, 0, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 165, 0, 0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(217, 0, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(217, 0, 255, 0.6);
        }

        /* Mensajes */
        .msg-bot {
            background: rgba(217, 0, 255, 0.08);
            border: 1px solid rgba(217, 0, 255, 0.2);
            border-left: 3px solid #d900ff;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
        }

        .msg-user {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-right: 3px solid #ffffff;
            font-family: 'Poppins', sans-serif;
        }

        /* Input */
        .chat-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: rgba(217, 0, 255, 0.5);
            box-shadow: 0 0 20px rgba(217, 0, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Typing Indicator */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #d900ff;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #d900ff;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>

    <!-- Import Map para la SDK de Google (ESM) -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <!-- Script Principal Autónomo (Client-Side) -->
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "TU_KEY_REAL";

        let chatSession = null;

        // Elementos UI
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const mobileStatus = document.getElementById('mobile-status');
        const mobileStatusDot = document.getElementById('mobile-status-dot');

        // Inicialización de la IA
        async function initializeAI() {
            try {
                if (!API_KEY) {
                    throw new Error("API Key faltante");
                }

                const genAI = new GoogleGenerativeAI(API_KEY);

                const model = genAI.getGenerativeModel({
                    model: "gemini-3.1-flash-lite",
                    systemInstruction: `
                        Eres Robot.ia,
                        agente IA futurista de Espíritu Digital.
                        Responde de manera corporativa,
                        elegante y precisa.
                    `
                });

                chatSession = model.startChat({
                    generationConfig: {
                        maxOutputTokens: 600,
                        temperature: 0.7,
                    }
                });

                console.log("IA conectada");

                // Actualizar UI a Online
                statusText.innerText = 'ONLINE';
                statusText.className = 'text-xs font-bold text-green-400 font-mono tracking-wider';
                statusDot.className = 'status-dot status-online';

                mobileStatus.innerHTML = '<div class="status-dot status-online" style="width:6px; height:6px;"></div> Online';
                mobileStatus.className = 'text-[10px] text-green-400 font-mono flex items-center gap-1 mt-1';

                userInput.disabled = false;
                sendBtn.disabled = false;

            } catch (err) {
                console.error(err);
                statusText.innerText = 'ERROR API';
                statusText.className = 'text-xs font-bold text-red-500 font-mono tracking-wider';
                statusDot.className = 'status-dot status-error';
                addBotMessage("> ERROR CRÍTICO: No se pudo enlazar con los servidores de Google AI. Verifica la API KEY en el código fuente.");
            }
        }

        // Efecto Typewriter (Renderizado carácter por carácter realista)
        function typeWriter(element, text, speed = 15, callback) {
            let i = 0;
            element.innerHTML = '';

            function type() {
                if (i < text.length) {
                    if (text.charAt(i) === '\n') {
                        element.innerHTML += '<br>';
                    } else {
                        // Interpretar negritas de markdown simple (**) 
                        // Nota: Para una implementación completa se requeriría un parser (como marked.js), 
                        // pero se mantiene simple para la inmersión del typewriter.
                        element.innerHTML += text.charAt(i);
                    }
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    // Variación de velocidad sutil para simular tipeo real de una IA rápida
                    let currentSpeed = speed + (Math.random() * 10 - 5);
                    setTimeout(type, currentSpeed);
                } else {
                    // Limpieza final de markdown simple (rudimentario para mantener la velocidad)
                    element.innerHTML = element.innerHTML.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    if (callback) callback();
                }
            }
            type();
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            let newHeight = this.scrollHeight;
            if (newHeight > 150) newHeight = 150;
            this.style.height = newHeight + 'px';
            if (this.value === '') this.style.height = 'auto';
        });

        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // Bienvenida Inmersiva
        window.addEventListener('DOMContentLoaded', () => {
            const initialText = "> INICIANDO SECUENCIA AUTÓNOMA...\n> CARGANDO MODELO: GEMINI-3.1-FLASH-LITE.\n\nHola, soy Robot.ia. Mi núcleo cognitivo ahora se ejecuta de forma independiente. ¿En qué te puedo ayudar hoy?";
            const msgSpan = document.getElementById('initial-msg');
            const cursor = document.getElementById('initial-cursor');

            setTimeout(() => {
                typeWriter(msgSpan, initialText, 25, () => {
                    cursor.remove();
                    initializeAI(); // Inicializa la SDK después de la bienvenida
                });
            }, 500);
        });

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-end slide-in';
            wrapper.innerHTML = `
                <div class="max-w-[90%] md:max-w-[75%] msg-user rounded-2xl rounded-tr-sm p-4 text-sm md:text-base leading-relaxed shadow-lg">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addBotMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start slide-in mb-6';

            const msgDiv = document.createElement('div');
            msgDiv.className = 'max-w-[90%] md:max-w-[75%] msg-bot rounded-2xl rounded-tl-sm p-5 text-sm md:text-base leading-relaxed shadow-lg relative';

            const textSpan = document.createElement('span');
            const cursor = document.createElement('span');
            cursor.className = 'cursor';

            msgDiv.appendChild(textSpan);
            msgDiv.appendChild(cursor);
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);

            typeWriter(textSpan, text, 12, () => {
                cursor.remove();
            });
        }

        // Lógica de Comunicación Directa (Gemini SDK)
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !chatSession) return;

            addUserMessage(text);

            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.disabled = true;
            sendBtn.disabled = true;

            typingIndicator.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Envía el mensaje directamente a Google AI.
                // chatSession ya contiene el historial de la conversación actual.
                const result = await chatSession.sendMessage(text);
                const responseText = result.response.text();

                typingIndicator.classList.add('hidden');
                addBotMessage(responseText);

            } catch (error) {
                typingIndicator.classList.add('hidden');
                console.error("Gemini Error:", error);

                // Manejo específico de Errores (Ej: 429 - Cuota excedida / Rate Limit)
                if (error.message && (error.message.includes('429') || error.status === 429)) {
                    addBotMessage("> Robot.ia está recalibrando sus sistemas por alto flujo de red. Intenta en 15 segundos.");
                } else {
                    addBotMessage("> ERROR DE COMUNICACIÓN. La red neuronal ha encontrado un fallo temporal. " + error.message);
                }
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
